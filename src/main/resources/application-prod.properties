# Production config for Railway
spring.application.name=internx-project

# Database — Railway MySQL plugin injects MYSQL_URL, MYSQL_USER, MYSQL_PASSWORD
# Use DATABASE_URL if you set it manually, otherwise fall back to Railway's MYSQL_* vars
spring.datasource.url=${DATABASE_URL:${MYSQL_URL}}
spring.datasource.username=${DATABASE_USERNAME:${MYSQL_USER}}
spring.datasource.password=${DATABASE_PASSWORD:${MYSQL_PASSWORD}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server — Railway injects PORT
server.port=${PORT:8081}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=604800000

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# File uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Actuator health endpoint for Railway healthcheck
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
